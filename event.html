<!DOCTYPE html>
<html>
<head>
  <title>Event System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Event Registration</h2>

<input id="name" placeholder="Your Name">
<input id="usn" placeholder="USN">
<input id="team" placeholder="Team Name">
<input id="members" placeholder="Team Members Names">
<input id="branch" placeholder="Branch">
<input id="section" placeholder="Section">

<button onclick="register()">Submit</button>

<hr>

<h2>Events</h2>
<div id="events"></div>

<button id="eventsBtn">Load Events</button>

<!-- Firebase (USE ONE VERSION ONLY - v8 for simplicity) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
  // Firebase config (replace with yours)
  const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_DOMAIN",
    projectId: "YOUR_PROJECT_ID",
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // REGISTER FUNCTION
  function register() {
    db.collection("registrations").add({
      name: document.getElementById("name").value,
      usn: document.getElementById("usn").value,
      team: document.getElementById("team").value,
      members: document.getElementById("members").value,
      branch: document.getElementById("branch").value,
      section: document.getElementById("section").value
    });

    alert("Registered Successfully!");
  }

  // EVENTS BUTTON CLICK FIX
  document.getElementById("eventsBtn").addEventListener("click", function () {
    const eventsDiv = document.getElementById("events");
    eventsDiv.innerHTML = `
      <div class="card">
        <h3>Hackathon</h3>
        <p>Date: 30 April</p>
      </div>
      <div class="card">
        <h3>Ideathon</h3>
        <p>Date: 5 May</p>
      </div>
    `;
  });
</script>

</body>
</html>
