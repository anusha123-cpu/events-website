<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Events</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    /* ... keep everything you already have ... */

    /* CARDS */
    .event-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px 28px;
      margin-bottom: 14px;
      display: grid;

      /* CHANGED: add an image column */
      grid-template-columns: 64px 60px 1px 1fr auto;

      gap: 20px;
      align-items: center;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      opacity: 0;
      animation: cardIn 0.45s ease forwards;
    }

    /* NEW: image styles */
    .event-image {
      width: 64px;
      height: 64px;
      border-radius: 12px;
      border: 1px solid var(--border);
      object-fit: cover;
      display: block;
      background: rgba(255,255,255,0.04);
    }

    @media (max-width: 600px) {
      /* CHANGED: keep it simple on mobile; hide divider/action already */
      .event-card { grid-template-columns: 56px 1fr; }
      .event-date-block, .event-divider, .event-action { display: none; }
      .tab-btn { padding: 8px 14px; font-size: 12px; }

      .event-image { width: 56px; height: 56px; border-radius: 10px; }
    }
  </style>
</head>
<body>
<div class="container">
  <!-- ... keep your existing markup ... -->
</div>

<script>
  // ── Helpers ──────────────────────────────────────────────────────
  const now = new Date();

  const d = (days, h = 10, m = 0) => {
    const dt = new Date(now);
    dt.setDate(dt.getDate() + days);
    dt.setHours(h, m, 0, 0);
    return dt;
  };

  const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const DAYS   = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

  const fmt = dt => dt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  // ── Event data ───────────────────────────────────────────────────
  // NEW: add `image` per event (can be any image URL)
  const events = [
    { title: "Design Systems Workshop",   start: d(-30,10), end: d(-30,13), location: "Studio A, Block 4",      tag: "Design",
      image: "https://images.unsplash.com/photo-1559028012-481c04fa702d?auto=format&fit=crop&w=256&h=256&q=80" },
    { title: "Annual Hackathon 2025",     start: d(-15, 9), end: d(-14,18), location: "Tech Hub, Koramangala",  tag: "Tech",
      image: "https://images.unsplash.com/photo-1531297484001-80022131f5a1?auto=format&fit=crop&w=256&h=256&q=80" },
    { title: "Photography Masterclass",   start: d( -7,14), end: d( -7,17), location: "Gallery 9, MG Road",     tag: "Art",
      image: "https://images.unsplash.com/photo-1452587925148-ce544e77e70d?auto=format&fit=crop&w=256&h=256&q=80" },
    { title: "Web3 Summit",               start: d(-60, 9), end: d(-59,17), location: "NIMHANS Convention",     tag: "Tech",
      image: "https://images.unsplash.com/photo-1555949963-aa79dcee981c?auto=format&fit=crop&w=256&h=256&q=80" },
    { title: "Jazz Night",                start: d( -3,19), end: d( -3,23), location: "Blue Bar, Indiranagar",  tag: "Music",
      image: "https://images.unsplash.com/photo-1511379938547-c1f69419868d?auto=format&fit=crop&w=256&h=256&q=80" },

    { title: "Creative Coding Bootcamp",  start: d( -2, 9), end: d(  3,18), location: "IIIT Bangalore",         tag: "Tech",
      image: "https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?auto=format&fit=crop&w=256&h=256&q=80" },
    { title: "Art Residency: Urban Lens", start: d( -1,10), end: d(  2,20), location: "Jaaga Creative Space",   tag: "Art",
      image: "https://images.unsplash.com/photo-1526481280695-3c687fd5432c?auto=format&fit=crop&w=256&h=256&q=80" },

    { title: "AI & Society Conference",   start: d(  4, 9), end: d(  4,18), location: "Sheraton Grand",         tag: "Tech",
      image: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=256&h=256&q=80" },
    { title: "Stand-Up Comedy Night",     start: d(  6,20), end: d(  6,22), location: "The Comedy Factory",     tag: "Entertainment",
      image: "https://images.unsplash.com/photo-1527224857830-43a7acc85260?auto=format&fit=crop&w=256&h=256&q=80" },
    { title: "Marathon 2026",             start: d( 10, 6), end: d( 10,12), location: "Cubbon Park",            tag: "Sports",
      image: "https://images.unsplash.com/photo-1540539234-c14a20fb7c7b?auto=format&fit=crop&w=256&h=256&q=80" },
    { title: "Indie Film Festival",       start: d( 14,10), end: d( 18,22), location: "PVR Forum Mall",         tag: "Art",
      image: "https://images.unsplash.com/photo-1485846234645-a62644f84728?auto=format&fit=crop&w=256&h=256&q=80" },
    { title: "Startup Pitch Night",       start: d( 21,18), end: d( 21,21), location: "91springboard",          tag: "Business",
      image: "https://images.unsplash.com/photo-1556761175-4b46a572b786?auto=format&fit=crop&w=256&h=256&q=80" },
  ];

  const classify = ev =>
    ev.end   < now ? "past"     :
    ev.start > now ? "upcoming" : "present";

  const buckets = { past: [], present: [], upcoming: [] };
  events.forEach(ev => buckets[classify(ev)].push(ev));

  buckets.past.sort((a, b) => b.start - a.start);
  buckets.present.sort((a, b) => a.start - b.start);
  buckets.upcoming.sort((a, b) => a.start - b.start);

  // ── Render cards ─────────────────────────────────────────────────
  function cardHTML(ev, type, delay) {
    const s = ev.start;
    const multiDay = s.toDateString() !== ev.end.toDateString();
    const dateStr  = multiDay
      ? `${s.getDate()} ${MONTHS[s.getMonth()]} – ${ev.end.getDate()} ${MONTHS[ev.end.getMonth()]}`
      : DAYS[s.getDay()];

    const btnLabel =
      type === "past"    ? "View recap" :
      type === "present" ? "Join now"   : "Register";

    // NEW: image + title + date included in the card
    return `
      <div class="event-card ${type}" style="animation-delay:${delay}s">
        <img class="event-image" src="${ev.image}" alt="${ev.title}" loading="lazy" />

        <div class="event-date-block">
          <div class="day">${String(s.getDate()).padStart(2,'0')}</div>
          <div class="month">${MONTHS[s.getMonth()]} '${String(s.getFullYear()).slice(-2)}</div>
        </div>

        <div class="event-divider"></div>

        <div class="event-info">
          <span class="event-tag">${ev.tag}</span>
          <div class="event-title">${ev.title}</div>
          <div class="event-meta">
            <span>📍 ${ev.location}</span>
            <span>📅 ${dateStr}</span>
          </div>
        </div>

        <div class="event-action">
          <div class="event-time">${fmt(ev.start)}</div>
          <button class="btn btn-${type}">${btnLabel}</button>
        </div>
      </div>`;
  }

  ["past","present","upcoming"].forEach(type => {
    const panel = document.getElementById(`panel-${type}`);
    const badge = document.getElementById(`badge-${type}`);
    const list  = buckets[type];

    badge.textContent = list.length;

    panel.innerHTML = list.length
      ? list.map((ev, i) => cardHTML(ev, type, i * 0.07)).join('')
      : `<div class="empty-state">
           <span class="icon">🗓</span>
           <p>No ${type} events right now.</p>
         </div>`;
  });

  // ... keep your tab switching code ...
</script>
</body>
</html>
